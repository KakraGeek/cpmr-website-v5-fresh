title: Source tree conventions
status: TODO
architect_gate_required: No
user_story: >
  As a developer, I want predictable folders for components, layouts, content, and data.
acceptance_criteria:
  - Directories exist per docs/03_architecture/04_architecture.md §7.1 (src/components/ui, layout, content, departments, search; plus src/layouts, src/pages, src/content, src/data, src/styles).
  - Empty directories use .gitkeep where required by tooling.
tasks:
