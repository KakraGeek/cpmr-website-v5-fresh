  - docs/02_design/DESIGN.md
  - docs/03_architecture/04_architecture.md
  - docs/03_architecture/06_project_context.md
execution:
  files_allowed:
    - src/components/ui/**
    - src/components/layout/**
    - src/components/content/**
    - src/components/departments/**
    - src/components/search/**
    - src/layouts/**
    - src/pages/**
