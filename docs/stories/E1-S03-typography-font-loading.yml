id: E1-S03
epic: E1
sprint_order: 103
title: Typography loading strategy
status: TODO
architect_gate_required: No
user_story: >
  As a designer, I want Inter and Source Serif 4 available without layout shift so that typography matches DESIGN.md stacks.
acceptance_criteria:
  - Fonts loaded per DESIGN.md font stacks with acceptable font-display behaviour.
  - No CLS regressions on a representative layout using the global styles and layout shell.
tasks:
  - Implement font loading per DESIGN.md in allowed files (e.g. @font-face in global.css and/or font links in layouts).
  - Validate font-display and initial render on a sample view using the existing layout.
dependencies:
  - E1-S01
context_files:
  - docs/04_stories/05_story_map.md
  - docs/00_source/CPMR_Institutional_Website_Redesign_Brief.md
  - docs/01_planning/01_analysis.md
  - docs/01_planning/02_prd.md
  - docs/02_design/03_ux_blueprint.md
  - docs/02_design/DESIGN.md
  - docs/03_architecture/04_architecture.md
  - docs/03_architecture/06_project_context.md
execution:
  files_allowed:
    - src/styles/global.css
    - src/layouts/**
  files_forbidden:
    - astro.config.mjs
    - package.json
    - src/pages/**
    - src/content/**
    - src/data/**
    - src/components/**
    - public/**
  verification_commands:
    - npm run build
    - npm run validate
qa_checklist:
  - Confirm every acceptance criterion is satisfied.
  - Confirm implementation follows DESIGN.md (font stacks and typography guidance).
  - Confirm implementation follows docs/03_architecture/04_architecture.md.
  - Confirm static build passes (npm run build).
  - Confirm no forbidden files were changed.
  - Confirm font loading does not embed editorial content in layout (CMS-ready: fonts are presentation infrastructure only).
