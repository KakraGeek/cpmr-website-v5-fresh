id: E1-S04
epic: E1
sprint_order: 104
title: UI primitives package
status: TODO
architect_gate_required: No
user_story: >
  As a developer, I want Button, Card, and Icon wrappers using tokens only so that UI stays consistent and reviewable.
acceptance_criteria:
  - Components in src/components/ui/ use semantic utilities from the theme.
  - No forbidden arbitrary values per docs/03_architecture/06_project_context.md.
  - Focus ring uses the shadow.ring_focus token (or semantic utility mapped to that token).
tasks:
  - Add or update Button, Card, and Icon (or equivalent) components under src/components/ui/ using semantic classes only.
  - Wire focus styles to the ring focus token mapping from DESIGN.md and @theme.
  - Ensure primitives accept content via slots or props without hardcoding governed institutional strings.
dependencies:
  - E1-S02
context_files:
  - docs/04_stories/05_story_map.md
  - docs/00_source/CPMR_Institutional_Website_Redesign_Brief.md
  - docs/01_planning/01_analysis.md
  - docs/01_planning/02_prd.md
  - docs/02_design/03_ux_blueprint.md
  - docs/02_design/DESIGN.md
  - docs/03_architecture/04_architecture.md
  - docs/03_architecture/06_project_context.md
execution:
  files_allowed:
    - src/components/ui/**
  files_forbidden:
    - astro.config.mjs
    - package.json
    - src/pages/**
    - src/content/**
    - src/data/**
    - src/layouts/**
    - src/styles/global.css
    - public/**
  verification_commands:
    - npm run build
    - npm run validate
qa_checklist:
  - Confirm every acceptance criterion is satisfied.
  - Confirm implementation follows DESIGN.md (components, tokens, focus).
  - Confirm implementation follows docs/03_architecture/04_architecture.md and docs/03_architecture/06_project_context.md.
  - Confirm static build passes (npm run build).
  - Confirm no forbidden files were changed.
  - Confirm primitives preserve future CMS compatibility (no durable institutional copy inside components; use slots or props for labels).
