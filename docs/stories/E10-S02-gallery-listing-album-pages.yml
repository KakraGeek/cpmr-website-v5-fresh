id: E10-S02
epic: E10
sprint_order: 1002
title: Gallery listing and album pages
status: TODO
architect_gate_required: Yes
user_story: >
  As a visitor, I want to browse institutional photography so that I can see CPMR activities and facilities through governed albums.
acceptance_criteria:
  - A static gallery listing route is generated from the gallery collection (per docs/02_design/03_ux_blueprint.md §20 and docs/04_stories/05_story_map.md Epic E10) using the conventions in docs/03_architecture/04_architecture.md §4 with one chosen root recorded in the implementation PR or docs.
  - Each album in the gallery collection generates a static album route via getStaticPaths consistent with docs/03_architecture/04_architecture.md §4.3, with no SSR introduced.
  - The listing uses GalleryCard semantics from docs/02_design/DESIGN.md §13.21 (cover image, title, image count, date) and lists are token-driven with no arbitrary Tailwind values.
  - Album pages render images with mandatory alt text from the schema and present captions where provided, consistent with docs/02_design/DESIGN.md §15 and docs/01_planning/02_prd.md §7 C4.
  - If a carousel or lightbox is used, it is keyboard operable (arrow keys, Esc to close, focus trap, visible close button) per docs/02_design/03_ux_blueprint.md §20 and docs/02_design/DESIGN.md §13/§15, and respects prefers-reduced-motion per docs/02_design/DESIGN.md §11 with no auto-advance.
  - LightboxDialog (if used) uses shadow.e4 and z_index.modal tokens per docs/02_design/DESIGN.md §10 and §12; no inline style or arbitrary values introduced for scrim/colour.
  - Empty albums or an empty collection produce an honest empty state (no fabricated tiles, no broken links) consistent with docs/02_design/03_ux_blueprint.md §27.
  - One h1 per route and breadcrumbs are reused from existing layout per docs/02_design/DESIGN.md §15 and the E2 layout stories.
  - Below-fold images use lazy loading and responsive sizing aligned with docs/01_planning/02_prd.md §27 PF2 and docs/03_architecture/04_architecture.md §11.
tasks:
  - Implement the gallery listing route under src/pages/media/** (or the chosen single root recorded for E10) consuming the gallery collection via getCollection.
  - Implement album detail routes via getStaticPaths returning one page per gallery entry; no SSR.
  - Compose GalleryCard and a token-driven album layout using existing UI primitives and content components only.
  - If a lightbox or carousel is required by content, implement keyboard support, focus trap, Esc handling, and prefers-reduced-motion handling; gate any client-side island narrowly to the gallery surface.
  - Wire alt text, captions, and image counts from collection entries; render honest empty states when albums or images are missing.
  - Document the chosen gallery URL root (e.g. /media/ vs /media-gallery/) inline in the route file or adjacent README note for downstream linking.
dependencies:
  - E10-S01
  - E2-S01
  - E2-S07
