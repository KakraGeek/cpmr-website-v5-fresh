qa_checklist:
  - Confirm every acceptance criterion is satisfied.
  - Confirm no forbidden files were changed.
  - Confirm implementation follows DESIGN.md (GalleryCard, LightboxDialog, tokens, z-index, motion).
  - Confirm implementation follows docs/03_architecture/04_architecture.md (static routes, getStaticPaths, no SSR).
  - Confirm static build passes (npm run build / npm run validate).
  - Confirm forbidden-file validation (only allowed paths touched).
  - Confirm keyboard, focus trap, Esc handling and prefers-reduced-motion behaviour for any lightbox or carousel.
  - Confirm album and listing routes remain sourced from governed src/content/gallery entries for future CMS compatibility.
