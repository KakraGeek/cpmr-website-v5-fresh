qa_checklist:
  - Confirm every acceptance criterion is satisfied.
  - Confirm no forbidden files were changed.
  - Confirm implementation follows DESIGN.md (DownloadCard, tokens, no arbitrary Tailwind values).
  - Confirm implementation follows docs/03_architecture/04_architecture.md (single chosen root, no SSR, static filters, public/documents asset placement).
  - Confirm static build passes (npm run build / npm run validate).
  - Confirm forbidden-file validation (only allowed paths touched).
  - Confirm no broken download links ship (missing files fail the build or are omitted).
  - Confirm download entries and asset references remain governed under src/content/downloads for future CMS compatibility.
