id: E10-S03
epic: E10
sprint_order: 1003
title: Downloads centre
status: TODO
architect_gate_required: Yes
user_story: >
  As a user, I want to find PDFs and forms quickly so that I can download authoritative CPMR documents with clear metadata.
acceptance_criteria:
  - A single downloads URL root is chosen between /resources/downloads/ and /downloads/ and recorded in the implementation PR or docs, per docs/03_architecture/04_architecture.md §4.2 and docs/02_design/03_ux_blueprint.md §22.
  - A downloads content collection is registered in src/content.config.ts or src/content/config.ts with a schema aligned to docs/01_planning/02_prd.md §22 (DL2 metadata fields title, description, document type, date, owning unit, file size/format; DL3 filters; DL4 integrity expectations).
  - The downloads hub route lists entries grouped or categorised per docs/01_planning/02_prd.md §22 DL1 (annual reports, forms, brochures, policies, service documents) with metadata surfaced accessibly per docs/02_design/DESIGN.md §13.22 DownloadCard.
  - Category and date filters are implemented client-side using static-compatible mechanisms (no SSR, no server endpoints) per docs/01_planning/02_prd.md §22 DL3 and docs/03_architecture/04_architecture.md §3.
  - DownloadCard rendering follows docs/02_design/DESIGN.md §13.22 (list row layout, file-type icon by extension, explicit "Download" action label, visible "(PDF, 2.4 MB)" style summary) with tokens only and no arbitrary Tailwind values.
  - If a referenced file is missing at build, the build fails or the entry is omitted rather than rendering a broken link, per docs/02_design/DESIGN.md §13.22 accessibility note and docs/03_architecture/04_architecture.md §19 forbidden patterns.
  - PDFs and forms referenced by entries are stored under public/documents/** (or the agreed stable URL location) per docs/03_architecture/04_architecture.md §11.2.
  - One h1 per route, breadcrumbs reused from the E2 layout, and an honest empty state when a filter has no matches per docs/02_design/03_ux_blueprint.md §27.
tasks:
  - Decide and record the single downloads URL root (e.g. /resources/downloads/ or /downloads/) and document it in the route file header or adjacent README note.
  - Add defineCollection for downloads with Zod fields covering DL2 metadata and the path to the binary asset under public/documents.
  - Seed governed entries under src/content/downloads with valid frontmatter so the hub renders.
  - Implement the downloads hub route under the chosen single root that consumes the downloads collection and renders DownloadCard list rows grouped by category.
  - Implement client-side filters (category, date, file type, owning unit) using minimal vanilla JS or a story-justified island; no SSR.
  - Ensure file-existence validation at build time so broken entries fail the build or are omitted rather than ship as broken links.
  - Place binary assets under public/documents/** with stable URLs and confirm relative paths render correctly under the chosen root.
