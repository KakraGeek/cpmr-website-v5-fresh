id: E13-S01
epic: E13
sprint_order: 1301
title: Deployment runbook
status: TODO
architect_gate_required: No
user_story: "As an operator, I deploy `dist/` safely."
acceptance_criteria:
  - "A runbook under `docs/` describes uploading the static `dist/` artefact to a shared-hosting web root, with explicit steps for SFTP and cPanel File Manager (`docs/04_stories/05_story_map.md`)."
  - "Runbook documents cache-control guidance for static assets suitable for shared hosting (short TTL for HTML, long TTL for hashed assets) (`docs/01_planning/02_prd.md` §28)."
  - "Runbook states that no Node runtime, server adapter, or SSR is required or permitted on the server (`docs/03_architecture/04_architecture.md` §19; `docs/03_architecture/06_project_context.md`)."
  - "Runbook includes a pre-flight checklist (clean working tree, `npm run validate` green, regenerated `dist/`) and a post-deploy smoke list (home, one department route, 404, one downloads link)."
  - "Runbook preserves future CMS compatibility by mandating build-time-only content ingestion (`docs/03_architecture/04_architecture.md` §16)."
tasks:
  - "Create `docs/deployment/runbook.md` as the canonical operator runbook for shared-hosting deployment."
  - "Document local build (`npm run build`) and validation (`npm run validate`) steps with expected `dist/` contents."
  - "Document upload procedure for shared hosting via SFTP and cPanel File Manager."
  - "Document cache-control guidance and provide an example `.htaccess` snippet for static assets."
  - "Document the no-Node-on-server constraint and cross-reference `docs/01_planning/02_prd.md` §28 and `docs/03_architecture/04_architecture.md` §13."
  - "Add pre-flight and post-deploy smoke checklists with route-level checks."
dependencies:
  - E0-S02
context_files:
  - docs/04_stories/05_story_map.md
  - docs/00_source/CPMR_Institutional_Website_Redesign_Brief.md
  - docs/01_planning/01_analysis.md
  - docs/01_planning/02_prd.md
  - docs/02_design/03_ux_blueprint.md
  - docs/02_design/DESIGN.md
  - docs/03_architecture/04_architecture.md
  - docs/03_architecture/06_project_context.md
execution:
  files_allowed:
    - docs/deployment/**
    - docs/**
  files_forbidden:
    - src/**
    - src/content/**
    - src/data/**
    - src/styles/**
    - public/**
    - astro.config.mjs
    - package.json
    - package-lock.json
    - scripts/**
  verification_commands:
    - npm run build
    - npm run validate
qa_checklist:
  - Confirm every acceptance criterion is satisfied.
  - Confirm no forbidden files were changed (except explicit waivers).
  - Confirm runbook does not introduce UI claims that contradict DESIGN.md.
  - "Confirm runbook aligns with `docs/03_architecture/04_architecture.md` (static output, no SSR, no Node on server)."
  - "Confirm static build passes (`npm run build` / `npm run validate`)."
  - Confirm runbook preserves future CMS compatibility by requiring build-time-only content ingestion.
