id: E13-S03
epic: E13
sprint_order: 1303
title: Redirect note placeholder
status: TODO
architect_gate_required: No
user_story: "As SEO, I plan legacy 301s."
acceptance_criteria:
  - "A placeholder document under `docs/seo/` describes the intended approach to legacy 301 redirects and states that real entries are blocked on completion of the legacy URL inventory (`docs/01_planning/02_prd.md` §26 SEO4; `docs/04_stories/05_story_map.md`)."
  - "The document defines the canonical record format future redirect entries will use (legacy source, new target, status code, owner, date verified)."
  - "The document names the eventual implementation surface (e.g. shared-hosting `.htaccess` or hosting panel rules) without authoring any rules."
  - "No `.htaccess`, no `astro.config.mjs` redirect configuration, and no runtime redirect handler are introduced by this story."
  - "No fake, sample-as-live, or speculative source-to-target mappings are committed."
tasks:
  - "Create `docs/seo/redirects.md` as the placeholder strategy document."
  - "State the inventory dependency and cross-link `docs/01_planning/02_prd.md` §26 SEO4."
  - "Define the redirect record schema (source, target, status, owner, verified-on)."
  - "Name the implementation surface (`.htaccess` on shared hosting) and explicitly defer authoring real rules."
  - "Add a 'Do not invent redirects' caveat block referencing this story."
  - "Cross-link the redirect placeholder from the deployment runbook (E13-S01) so operators discover it before launch."
