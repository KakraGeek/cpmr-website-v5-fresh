id: E13-S04
epic: E13
sprint_order: 1304
title: Release checklist
status: TODO
architect_gate_required: No
user_story: "As a PM, I gate launches."
acceptance_criteria:
  - "A release checklist under `docs/release/` ties every PRD §33 acceptance row to at least one verifiable check (`docs/01_planning/02_prd.md` §33; `docs/04_stories/05_story_map.md`)."
  - "Checklist includes a build gate row tied to `npm run validate` / `npm run build` success."
  - "Checklist includes a search-MVP verification row tied to E11-S05 outcomes (Clinic, DAU, ≥1 department, ≥1 staff profile)."
  - "Checklist includes a sitemap and robots verification row tied to E12-S03."
  - "Checklist includes a deployment readiness row pointing to the E13-S01 runbook and to E13-S02 base-path verification when subdirectory hosting applies."
  - "Checklist includes DESIGN.md compliance and architecture compliance rows (no SSR, no server adapter, no runtime CMS per `docs/03_architecture/04_architecture.md` §19)."
  - "Checklist defines sign-off lines (PM, Architect, Editor-in-Chief) and an effective-date field."
tasks:
  - "Create `docs/release/checklist.md`."
  - "Enumerate every PRD §33 acceptance row and pair each with a verifiable check."
  - "Add the build gate row (`npm run validate` / `npm run build`)."
  - "Add the search-MVP row referencing E11-S05."
  - "Add the sitemap and robots row referencing E12-S03."
  - "Add the deployment readiness row referencing E13-S01 and (when applicable) E13-S02."
  - "Add the DESIGN.md compliance row and the architecture compliance row."
  - "Add sign-off lines and an effective-date field."
dependencies:
  - E12-S03
  - E11-S05
context_files:
  - docs/04_stories/05_story_map.md
  - docs/00_source/CPMR_Institutional_Website_Redesign_Brief.md
  - docs/01_planning/01_analysis.md
  - docs/01_planning/02_prd.md
  - docs/02_design/03_ux_blueprint.md
  - docs/02_design/DESIGN.md
  - docs/03_architecture/04_architecture.md
  - docs/03_architecture/06_project_context.md
execution:
  files_allowed:
    - docs/release/**
    - docs/deployment/**
    - docs/**
  files_forbidden:
    - src/**
    - src/content/**
    - src/data/**
    - src/styles/**
    - public/**
    - astro.config.mjs
    - package.json
    - package-lock.json
    - scripts/**
  verification_commands:
    - npm run build
    - npm run validate
qa_checklist:
  - Confirm every acceptance criterion is satisfied.
  - Confirm no forbidden files were changed (except explicit waivers).
  - Confirm checklist references DESIGN.md compliance as a launch-gate row.
  - "Confirm checklist references `docs/03_architecture/04_architecture.md` compliance (no SSR, no server adapter, no runtime CMS) as a launch-gate row."
  - "Confirm static build passes (`npm run build` / `npm run validate`)."
  - Confirm every PRD §33 acceptance row maps to at least one verifiable check before sign-off lines.
  - Confirm checklist preserves future CMS compatibility by gating on build-time content only and not assuming a runtime CMS.
