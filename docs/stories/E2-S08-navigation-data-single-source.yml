id: E2-S08
epic: E2
sprint_order: 208
title: Navigation data single source
status: TODO
architect_gate_required: Yes
user_story: >
  As a maintainer, I want mega, mobile, and footer driven from one structured definition.
acceptance_criteria:
  - A single src/data module exports the navigation model consumed by header and footer implementations.
  - Utility, mega, and mobile consumers read the same typed structures without duplicated IA lists.
  - TypeScript types for navigation entries are explicit and exported alongside the model.
tasks:
  - Consolidate navigation.ts so UtilityNavigation, MegaNavigation, MobileNavigation, and SiteFooter import a single canonical model.
  - Align footer link clusters with the same source of truth where blueprint requires mirroring.
  - Resolve any interim duplication introduced across E2-S03 through E2-S06 without changing public URL contracts approved in architecture.
dependencies:
  - E2-S03
  - E2-S04
  - E2-S05
  - E2-S06
context_files:
  - docs/04_stories/05_story_map.md
  - docs/00_source/CPMR_Institutional_Website_Redesign_Brief.md
  - docs/01_planning/01_analysis.md
  - docs/01_planning/02_prd.md
  - docs/02_design/03_ux_blueprint.md
  - docs/02_design/DESIGN.md
  - docs/03_architecture/04_architecture.md
  - docs/03_architecture/06_project_context.md
execution:
  files_allowed:
    - src/data/navigation.ts
    - src/data/footer.ts
    - src/components/layout/UtilityNavigation.astro
    - src/components/layout/MegaNavigation.astro
    - src/components/layout/MobileNavigation.astro
    - src/components/layout/SiteFooter.astro
    - src/components/layout/SiteHeader.astro
  files_forbidden:
    - astro.config.mjs
    - src/content/**
    - src/pages/**
    - public/documents/**
    - dist/**
    - package.json
  verification_commands:
    - npm run build
    - npm run validate
qa_checklist:
  - Confirm every acceptance criterion is satisfied.
  - Confirm no forbidden files were changed.
  - Confirm implementation follows DESIGN.md.
  - Confirm implementation follows docs/03_architecture/04_architecture.md and docs/03_architecture/06_project_context.md.
  - Confirm static build passes via npm run build.
  - Confirm forbidden-path validation against execution.files_forbidden.
  - Confirm architect gate approval is recorded before merge because this story changes the shared navigation data contract across layout surfaces per story map architect gate Yes.
  - Confirm the consolidated model preserves stable keys and hrefs suitable for future headless CMS or build-time ingestion per architecture section 16 without introducing runtime CMS reads.
