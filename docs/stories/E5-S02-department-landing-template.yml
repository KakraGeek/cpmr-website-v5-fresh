id: E5-S02
epic: E5
sprint_order: 502
title: Department landing template
status: TODO
architect_gate_required: Yes
user_story: >
  As a visitor, I want to experience a department as a distinct place on the site.
acceptance_criteria:
  - The route implements template T_DEPARTMENT_HOME per docs/02_design/DESIGN.md §14.3.
  - The page composes department hero and local navigation area; sections that lack content use honest empty states.
  - Department subtree URLs follow the agreed /departments/[slug]/ baseline in docs/03_architecture/04_architecture.md §6.
  - Structure remains compatible with future CMS-driven department records (build-time data, schema-driven frontmatter).
tasks:
  - Implement src/pages/departments/[slug]/index.astro using getStaticPaths from the departments collection.
  - Add or compose department-scoped components under src/components/departments/ for T_DEPARTMENT_HOME sections per DESIGN.md §14.3.
  - Integrate Breadcrumbs per dependency on E2-S07 where applicable on the landing route.
dependencies:
  - E5-S01
  - E2-S07
context_files:
  - docs/04_stories/05_story_map.md
  - docs/00_source/CPMR_Institutional_Website_Redesign_Brief.md
  - docs/01_planning/01_analysis.md
  - docs/01_planning/02_prd.md
  - docs/02_design/03_ux_blueprint.md
  - docs/02_design/DESIGN.md
  - docs/03_architecture/04_architecture.md
  - docs/03_architecture/06_project_context.md
execution:
  files_allowed:
    - src/pages/departments/[slug]/index.astro
    - src/components/departments/**
  files_forbidden:
    - astro.config.mjs
    - package.json
    - docs/02_design/DESIGN.md
    - src/pages/departments/index.astro
    - src/pages/index.astro
    - src/layouts/**
    - src/components/layout/**
    - src/data/**
    - public/documents/**
  verification_commands:
    - npm run build
    - npm run validate
qa_checklist:
  - Confirm every acceptance criterion is satisfied.
  - Confirm implementation follows DESIGN.md (T_DEPARTMENT_HOME, tokens, accessibility baseline).
  - Confirm implementation follows docs/03_architecture/04_architecture.md §6 department mini-site rules.
  - Confirm static build passes (npm run build / npm run validate).
  - Confirm no forbidden files were changed.
  - Confirm department labels and ordering come from frontmatter or src/data per architecture, not one-off hardcoded department forks.
