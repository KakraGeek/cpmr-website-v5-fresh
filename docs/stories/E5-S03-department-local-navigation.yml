user_story: 'As a user, I want to move within a department without returning to the
  global home page.

  '
acceptance_criteria:
- DepartmentTabs (or equivalent) provides sticky local navigation on desktop per DESIGN.md.
- Mobile behaviour follows the strategy documented in DESIGN.md for department local
  nav.
- Tab labels and order are driven from department frontmatter (or agreed data module),
  not hardcoded per department.
