id: E5-S07
epic: E5
sprint_order: 507
title: Department services and news
status: TODO
architect_gate_required: Yes
user_story: >
  As a visitor, I want to see services and updates scoped to a department.
acceptance_criteria:
  - Routes exist under /departments/[slug]/ for services-related and news-related department views as agreed in architecture (e.g. services/ and news/ subtrees per docs/03_architecture/04_architecture.md §6.2).
  - Content is filtered to the active department using stable relationship IDs; empty states are honest when upstream collections are sparse.
  - Implementation does not introduce SSR or runtime CMS on the public host for MVP.
tasks:
  - Add department-scoped services listing pages that subset or link to global services content introduced in E7-S01, filtered by department relationships where the schema supports it.
  - Add department-scoped news listing pages that consume the news collection from E8-S02 with department filters where fields exist.
  - Ensure navigation targets from DepartmentTabs remain consistent with implemented child routes.
dependencies:
  - E5-S02
  - E7-S01
  - E8-S02
context_files:
  - docs/04_stories/05_story_map.md
  - docs/00_source/CPMR_Institutional_Website_Redesign_Brief.md
  - docs/01_planning/01_analysis.md
  - docs/01_planning/02_prd.md
  - docs/02_design/03_ux_blueprint.md
  - docs/02_design/DESIGN.md
  - docs/03_architecture/04_architecture.md
  - docs/03_architecture/06_project_context.md
execution:
  files_allowed:
    - src/pages/departments/[slug]/services/**
    - src/pages/departments/[slug]/news/**
    - src/components/departments/**
  files_forbidden:
    - astro.config.mjs
    - package.json
    - docs/02_design/DESIGN.md
    - src/pages/services/**
    - src/pages/news/**
    - src/content/config.ts
    - src/content.config.ts
    - public/documents/**
  verification_commands:
    - npm run build
    - npm run validate
qa_checklist:
  - Confirm every acceptance criterion is satisfied.
  - Confirm implementation follows DESIGN.md for templates used on listing pages.
  - Confirm implementation follows docs/03_architecture/04_architecture.md for static routing and relationship resolution at build time.
  - Confirm static build passes (npm run build / npm run validate).
  - Confirm no forbidden files were changed.
  - Confirm services and news remain governed collection data compatible with future CMS workflows.
