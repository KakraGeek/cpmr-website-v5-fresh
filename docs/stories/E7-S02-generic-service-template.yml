id: E7-S02
epic: E7
sprint_order: 702
title: Generic service template
status: TODO
architect_gate_required: No
user_story: >
  As an editor, I want one deep template reused for non-priority services so that service pages stay consistent and maintainable.
acceptance_criteria:
  - A generic service detail route resolves from the services collection (slug-driven) per docs/03_architecture/04_architecture.md.
  - Section order matches DESIGN.md §14.4 (T_SERVICE_DETAIL) when sections exist.
  - Empty sections are omitted rather than showing blank placeholders.
tasks:
  - Register or extend the services content collection schema to support the T_SERVICE_DETAIL fields needed for generic services.
  - Implement src/pages/services/[slug].astro (or equivalent Astro 6 dynamic route) consuming collection entries.
  - Render sections in the fixed order from DESIGN.md §14.4, skipping missing content.
dependencies:
  - E7-S01
context_files:
  - docs/04_stories/05_story_map.md
  - docs/00_source/CPMR_Institutional_Website_Redesign_Brief.md
  - docs/01_planning/01_analysis.md
  - docs/01_planning/02_prd.md
  - docs/02_design/03_ux_blueprint.md
  - docs/02_design/DESIGN.md
  - docs/03_architecture/04_architecture.md
  - docs/03_architecture/06_project_context.md
execution:
  files_allowed:
    - src/pages/services/[slug].astro
    - src/content/services/**
    - src/content.config.ts
    - src/content/config.ts
    - src/components/content/**
  files_forbidden:
    - astro.config.mjs
    - package.json
    - src/layouts/**
    - src/pages/products/**
    - src/pages/departments/**
    - src/pages/research/**
    - src/pages/news/**
    - src/pages/events/**
    - src/pages/media/**
    - src/components/search/**
  verification_commands:
    - npm run build
    - npm run validate
qa_checklist:
  - Confirm every acceptance criterion in this story is satisfied.
  - Confirm no forbidden files were changed.
  - Confirm implementation follows docs/02_design/DESIGN.md (T_SERVICE_DETAIL §14.4).
  - Confirm implementation follows docs/03_architecture/04_architecture.md (collections and services model).
  - Confirm static build passes (npm run build / npm run validate).
  - Confirm service markdown and frontmatter remain suitable for a future headless CMS build-time feed.
