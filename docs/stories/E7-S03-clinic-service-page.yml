id: E7-S03
epic: E7
sprint_order: 703
title: Clinic service page
status: TODO
architect_gate_required: No
user_story: >
  As a patient, I want to complete the Clinic journey from the home page so that I can access hours, fees, contact, and maps quickly.
acceptance_criteria:
  - The /services/clinic/ route exists and meets docs/01_planning/02_prd.md §15.
  - Quick telephone, mailto, and map entry points are present where content supplies them.
  - Fee tables are marked up accessibly when present.
  - Last-reviewed metadata is surfaced when provided by content.
tasks:
  - Implement the Clinic route as src/pages/services/clinic.astro or src/pages/services/clinic/index.astro per repo convention.
  - Reuse T_SERVICE_DETAIL patterns from E7-S02; override or compose only where Clinic-specific modules require it.
  - Bind copy, fees tables, and metadata from src/content/services/ (or agreed governed path) without hardcoding unverified clinical claims.
dependencies:
  - E7-S02
context_files:
  - docs/04_stories/05_story_map.md
  - docs/00_source/CPMR_Institutional_Website_Redesign_Brief.md
  - docs/01_planning/01_analysis.md
  - docs/01_planning/02_prd.md
  - docs/02_design/03_ux_blueprint.md
  - docs/02_design/DESIGN.md
  - docs/03_architecture/04_architecture.md
  - docs/03_architecture/06_project_context.md
execution:
  files_allowed:
    - src/pages/services/clinic.astro
    - src/pages/services/clinic/index.astro
    - src/content/services/**
    - src/components/content/**
  files_forbidden:
    - astro.config.mjs
    - package.json
    - src/layouts/**
    - src/pages/products/**
    - src/pages/services/[slug].astro
    - src/pages/departments/**
    - src/pages/research/**
    - src/pages/news/**
    - src/pages/events/**
    - src/pages/media/**
    - src/components/search/**
  verification_commands:
    - npm run build
    - npm run validate
qa_checklist:
  - Confirm every acceptance criterion in this story is satisfied against docs/01_planning/02_prd.md §15.
  - Confirm no forbidden files were changed.
  - Confirm implementation follows docs/02_design/DESIGN.md.
  - Confirm implementation follows docs/03_architecture/04_architecture.md.
  - Confirm static build passes (npm run build / npm run validate).
  - Confirm Clinic facts and fees remain governed in content files for future CMS compatibility.
