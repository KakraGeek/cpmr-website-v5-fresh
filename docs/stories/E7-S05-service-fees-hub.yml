id: E7-S05
epic: E7
sprint_order: 705
title: Service fees hub
status: TODO
architect_gate_required: No
user_story: >
  As finance staff, I want an authoritative fees hub so that fee tables are dated, explained, and linked back to owning service pages.
acceptance_criteria:
  - The /services/fees/ route exists.
  - The page explains fee dating policy and links to relevant service pages per story map.
  - Fee tables use accessible table semantics when tables are present.
  - lastReviewed (or equivalent) metadata is shown when present in content.
tasks:
  - Add src/pages/services/fees.astro (or index under src/pages/services/fees/) using governed content for fee copy and table data.
  - Link from the hub to Clinic, DAU, and other service pages only where targets are approved.
  - Ensure table captions/headers align with DESIGN.md accessibility baseline.
dependencies:
  - E7-S01
context_files:
  - docs/04_stories/05_story_map.md
  - docs/00_source/CPMR_Institutional_Website_Redesign_Brief.md
  - docs/01_planning/01_analysis.md
  - docs/01_planning/02_prd.md
  - docs/02_design/03_ux_blueprint.md
  - docs/02_design/DESIGN.md
  - docs/03_architecture/04_architecture.md
  - docs/03_architecture/06_project_context.md
execution:
  files_allowed:
    - src/pages/services/fees.astro
    - src/pages/services/fees/index.astro
    - src/content/services/**
    - src/components/content/**
  files_forbidden:
    - astro.config.mjs
    - package.json
    - src/layouts/**
    - src/pages/products/**
    - src/pages/services/[slug].astro
    - src/pages/departments/**
    - src/pages/research/**
    - src/pages/news/**
    - src/pages/events/**
    - src/pages/media/**
    - src/components/search/**
  verification_commands:
    - npm run build
    - npm run validate
qa_checklist:
  - Confirm every acceptance criterion in this story is satisfied.
  - Confirm no forbidden files were changed.
  - Confirm implementation follows docs/02_design/DESIGN.md.
  - Confirm implementation follows docs/03_architecture/04_architecture.md.
  - Confirm static build passes (npm run build / npm run validate).
  - Confirm fee narrative and tables live in governed content for future CMS compatibility.
