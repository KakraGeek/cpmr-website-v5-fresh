user_story: >
  As an editor, I manage events with venues and times.
acceptance_criteria:
  - The events content collection is registered in src/content.config.ts or src/content/config.ts with a schema aligned to docs/01_planning/02_prd.md §20 E1 (title, date/time, venue, status, description, registration link if applicable, organiser, related department).
