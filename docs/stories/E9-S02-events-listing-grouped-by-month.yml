qa_checklist:
  - Confirm every acceptance criterion is satisfied.
  - Confirm no forbidden files were changed.
  - Confirm implementation follows DESIGN.md.
  - Confirm implementation follows docs/03_architecture/04_architecture.md.
  - Confirm static build passes (npm run build / npm run validate).
  - Confirm forbidden-file validation (only allowed paths touched).
  - Confirm listing reads governed events from src/content/events for future CMS compatibility.
