id: E9-S02
epic: E9
sprint_order: 902
title: Events listing grouped by month
status: TODO
architect_gate_required: Yes
user_story: >
  As a visitor, I scan upcoming events.
acceptance_criteria:
  - /events/ renders a listing sourced from the events collection without SSR.
  - Events are presented as a vertical list grouped by calendar month with a sticky month heading using muted small text per docs/02_design/DESIGN.md §14.5.
  - Listing items follow the EventCard contract in docs/02_design/DESIGN.md §13.14 (stretched link title, <time datetime>, venue, status chip, optional registration and department as applicable on cards).
  - URL and trailing-slash behaviour match agreed site policy in docs/03_architecture/06_project_context.md and routing table in docs/03_architecture/04_architecture.md.
tasks:
  - Implement src/pages/events/index.astro using getCollection('events') (or equivalent) with static output only.
  - Group displayed events by month and render sticky month labels per DESIGN.md §14.5.
  - Compose EventCard (or equivalent components under allowed paths) using design tokens only.
  - Filter or sort listing per PRD §20 E2 static-compatible calendar/list intent without inventing new product rules beyond cited docs.
dependencies:
  - E9-S01
context_files:
