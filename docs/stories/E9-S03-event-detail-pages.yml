user_story: >
  As a user, I register or learn details.
acceptance_criteria:
  - Event detail routes exist under /events/ with stable URLs and getStaticPaths derived from the events collection per docs/03_architecture/04_architecture.md.
  - Page presents title, schedule (with <time> where applicable), venue, status, body/description, organiser, optional registration link, and optional related department per docs/01_planning/02_prd.md §20 E1.
  - Registration link is optional and external links use safe patterns consistent with docs/02_design/DESIGN.md and UX blueprint.
