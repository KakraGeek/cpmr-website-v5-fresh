<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="org-chart-title" viewBox="0 0 720 420">
  <title id="org-chart-title">CPMR organisational structure overview</title>
  <style>
    .box { fill: none; stroke: currentColor; stroke-width: 1.5; }
    .line { fill: none; stroke: currentColor; stroke-width: 1.25; }
    .label { fill: currentColor; font-family: system-ui, sans-serif; font-size: 13px; font-weight: 600; text-anchor: middle; }
    .sublabel { fill: currentColor; font-family: system-ui, sans-serif; font-size: 11px; text-anchor: middle; opacity: 0.85; }
  </style>
  <rect class="box" x="280" y="16" width="160" height="48" rx="4" />
  <text class="label" x="360" y="38">Governing Board</text>
  <text class="sublabel" x="360" y="54">Oversight</text>
  <line class="line" x1="360" y1="64" x2="360" y2="88" />
  <rect class="box" x="280" y="88" width="160" height="48" rx="4" />
  <text class="label" x="360" y="110">Director</text>
  <text class="sublabel" x="360" y="126">Executive leadership</text>
  <line class="line" x1="360" y1="136" x2="360" y2="160" />
  <line class="line" x1="120" y1="160" x2="600" y2="160" />
  <line class="line" x1="120" y1="160" x2="120" y2="184" />
  <line class="line" x1="280" y1="160" x2="280" y2="184" />
  <line class="line" x1="440" y1="160" x2="440" y2="184" />
  <line class="line" x1="600" y1="160" x2="600" y2="184" />
  <rect class="box" x="40" y="184" width="160" height="56" rx="4" />
  <text class="label" x="120" y="208">Research</text>
  <text class="sublabel" x="120" y="226">Departments</text>
  <rect class="box" x="200" y="184" width="160" height="56" rx="4" />
  <text class="label" x="280" y="208">Services</text>
  <text class="sublabel" x="280" y="226">Clinic, DAU, units</text>
  <rect class="box" x="360" y="184" width="160" height="56" rx="4" />
  <text class="label" x="440" y="208">Corporate</text>
  <text class="sublabel" x="440" y="226">Administration</text>
  <rect class="box" x="520" y="184" width="160" height="56" rx="4" />
  <text class="label" x="600" y="208">Support</text>
  <text class="sublabel" x="600" y="226">Finance, HR, ICT</text>
  <line class="line" x1="120" y1="240" x2="120" y2="268" />
  <line class="line" x1="280" y1="240" x2="280" y2="268" />
  <line class="line" x1="440" y1="240" x2="440" y2="268" />
  <line class="line" x1="600" y1="240" x2="600" y2="268" />
  <rect class="box" x="40" y="268" width="160" height="40" rx="4" />
  <text class="sublabel" x="120" y="294">Department mini-sites</text>
  <rect class="box" x="200" y="268" width="160" height="40" rx="4" />
  <text class="sublabel" x="280" y="294">Public-facing services</text>
  <rect class="box" x="360" y="268" width="160" height="40" rx="4" />
  <text class="sublabel" x="440" y="294">Governance &amp; policy</text>
  <rect class="box" x="520" y="268" width="160" height="40" rx="4" />
  <text class="sublabel" x="600" y="294">Shared services</text>
</svg>
